// Media3 ExoPlayer + IMA SDK for native ad playback (Trillboards Partner API integration)
dependencies {
    implementation 'androidx.media3:media3-exoplayer:1.5.1'
    implementation 'androidx.media3:media3-ui:1.5.1'
    implementation 'androidx.media3:media3-exoplayer-ima:1.5.1'
    implementation 'com.google.ads.interactiveMedia.v3:interactivemedia:3.35.1'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.google.guava:guava:33.0.0-android'
}

android {
    packagingOptions {
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/INDEX.LIST'
    }
}
